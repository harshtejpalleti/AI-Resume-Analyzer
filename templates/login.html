<form action="/login_user" method="POST">

    <input
        type="email"
        name="email"
        placeholder="Email"
        required>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <button type="submit">
        Login
    </button>

</form>

<p>
    Don't have an account?
    <a href="/register">Register</a>
</p>
